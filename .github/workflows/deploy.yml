name: Deploy Docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate community modules index
        run: |
          python3 << 'PYEOF'
          import os, re

          community_dir = "docs/modules/community"
          modules = []

          for entry in sorted(os.listdir(community_dir)):
              path = os.path.join(community_dir, entry)
              if not os.path.isdir(path) or entry.startswith('_'):
                  continue
              index_file = os.path.join(path, "index.md")
              if not os.path.exists(index_file):
                  continue
              content = open(index_file).read()
              m = re.search(r'^title:\s*(.+)$', content, re.MULTILINE)
              title = m.group(1).strip() if m else entry
              body = re.sub(r'^---\n.*?---\n', '', content, flags=re.DOTALL).strip()
              body = re.sub(r'^#+[^\n]+\n+', '', body).strip()
              desc = body.split('\n\n')[0].replace('\n', ' ').strip()
              desc = re.sub(r'\[([^\]]+)\]\([^)]+\)', r'\1', desc)
              if len(desc) > 120:
                  desc = desc[:117] + '...'
              modules.append({'name': entry, 'title': title, 'desc': desc})

          index_path = os.path.join(community_dir, "index.md")
          content = open(index_path).read()

          if modules:
              rows = "\n".join(
                  f"| [`{m['name']}`](./{m['name']}/index.md) | {m['desc']} |"
                  for m in modules
              )
              generated = f"| Module | Description |\n|--------|-------------|\n{rows}"
          else:
              generated = "No community modules yet. Be the first to contribute!"

          content = re.sub(
              r'\{/\* COMMUNITY-MODULES-LIST \*/\}.*?\{/\* /COMMUNITY-MODULES-LIST \*/\}',
              f'{{/* COMMUNITY-MODULES-LIST */}}\n\n{generated}\n\n{{/* /COMMUNITY-MODULES-LIST */}}',
              content,
              flags=re.DOTALL
          )
          open(index_path, "w").write(content)
          print(f"Indexed {len(modules)} community module(s): {[m['name'] for m in modules]}")
          PYEOF

      - name: Generate core changelog from GitHub Releases
        run: |
          python3 << 'PYEOF'
          import urllib.request, urllib.error, json, re

          url = "https://api.github.com/repos/uqal-lang/uqal-core/releases?per_page=100"
          req = urllib.request.Request(url, headers={"Accept": "application/vnd.github+json", "X-GitHub-Api-Version": "2022-11-28"})

          try:
              releases = json.loads(urllib.request.urlopen(req).read())
          except urllib.error.HTTPError as e:
              print(f"GitHub API error {e.code}, keeping existing changelog")
              exit(0)

          if not releases:
              print("No releases found, keeping existing changelog")
              exit(0)

          frontmatter = "---\nid: changelog\ntitle: Changelog\nsidebar_position: 7\n---\n\n"
          header = "# Changelog\n\nAll notable changes to UQAL are documented here.\nThe format follows [Keep a Changelog](https://keepachangelog.com/en/1.1.0/).\n\n---\n\n"

          sections = []
          for r in releases:
              if r.get("draft"):
                  continue
              date = r["published_at"][:10]
              name = r["name"] or r["tag_name"]
              url = r["html_url"]
              body = (r.get("body") or "").strip()
              sections.append(f"## [{name} — {date}]({url})\n\n{body}\n\n---\n")

          open("docs/changelog.md", "w").write(frontmatter + header + "\n".join(sections))
          print(f"Generated changelog from {len(sections)} release(s)")
          PYEOF

      - name: Build
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
